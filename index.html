<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Obvious Cycles — Configurateur</title>
</head>
<body>
<script>
// Transmettre les paramètres URL à proto14
var params = window.location.search; // ex: ?modele=route
fetch('configurateur/proto14.html' + params)
  .then(r => r.text())
  .then(html => {
    document.open();
    document.write(html);
    document.close();
    // Corriger l'URL affichée
    window.history.replaceState({}, '', '/' + 'configurateur/' + params);
  });
</script>
</body>
</html>
