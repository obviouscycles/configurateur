<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Obvious Cycles Configurateur</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #0d0d0d; --bg2: #141414; --bg3: #1a1a1a; --bg4: #222;
    --border: #2a2a2a; --border2: #333;
    --text: #f2f2f2; --text2: #aaa; --text3: #666;
    --yellow: #F5C400; --font: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 1.5rem;
  }
  #login-screen h1 { font-size: 20px; font-weight: 600; color: var(--yellow); }
  #login-form { display: flex; flex-direction: column; gap: .75rem; width: 300px; }
  #login-form input {
    background: var(--bg3); border: 0.5px solid var(--border2); color: var(--text);
    padding: 10px 12px; font-size: 14px; font-family: var(--font); outline: none;
  }
  #login-form input:focus { border-color: var(--yellow); }
  #login-btn {
    background: var(--yellow); color: #1a1a00; font-weight: 700;
    padding: 10px; border: none; cursor: pointer; font-size: 14px; font-family: var(--font);
  }
  #login-error { color: #e24b4a; font-size: 13px; display: none; }

  /* ── ADMIN UI ── */
  #admin-ui { display: none; }
  header {
    background: var(--bg2); border-bottom: 0.5px solid var(--border);
    padding: .75rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 15px; font-weight: 600; color: var(--yellow); }
  header .meta { font-size: 12px; color: var(--text3); }
  .logout-btn { background: none; border: 0.5px solid var(--border2); color: var(--text2); padding: 5px 10px; cursor: pointer; font-size: 12px; font-family: var(--font); }

  main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }

  /* ── STATS ── */
  .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .stat-card { background: var(--bg3); border: 0.5px solid var(--border); padding: 1rem; }
  .stat-val { font-size: 28px; font-weight: 700; color: var(--yellow); }
  .stat-lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

  /* ── FILTRES ── */
  .filters {
    display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: 1rem;
    background: var(--bg3); border: 0.5px solid var(--border); padding: 1rem;
  }
  .filters select, .filters input {
    background: var(--bg4); border: 0.5px solid var(--border2); color: var(--text);
    padding: 7px 10px; font-size: 13px; font-family: var(--font); outline: none;
  }
  .filters select:focus, .filters input:focus { border-color: var(--yellow); }
  .filters label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; display: flex; flex-direction: column; gap: 4px; }
  .btn-reset-filter { background: none; border: 0.5px solid var(--border2); color: var(--text2); padding: 7px 12px; cursor: pointer; font-size: 12px; font-family: var(--font); align-self: flex-end; }
  .btn-export { background: var(--yellow); color: #1a1a00; border: none; padding: 7px 14px; cursor: pointer; font-size: 12px; font-family: var(--font); font-weight: 700; align-self: flex-end; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase;
    letter-spacing: .06em; padding: 8px 12px; border-bottom: 0.5px solid var(--border);
    background: var(--bg2); white-space: nowrap; cursor: pointer; user-select: none;
  }
  th:hover { color: var(--text2); }
  th .sort-icon { margin-left: 4px; opacity: .4; }
  th.sorted .sort-icon { opacity: 1; color: var(--yellow); }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:hover td { background: var(--bg3); }
  tr.clickable { cursor: pointer; }

  .badge {
    display: inline-block; padding: 2px 8px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .badge-devis { background: #1a2a00; color: var(--yellow); border: 0.5px solid var(--yellow); }
  .badge-sauvegarde { background: var(--bg4); color: var(--text3); border: 0.5px solid var(--border2); }

  .no-results { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }

  /* ── DETAIL PANEL ── */
  #detail-panel {
    display: none; position: fixed; top: 0; right: 0; bottom: 0; width: 480px;
    background: var(--bg2); border-left: 0.5px solid var(--border); overflow-y: auto;
    z-index: 200; padding: 1.5rem;
  }
  #detail-panel.open { display: block; }
  #detail-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 199;
  }
  #detail-overlay.open { display: block; }
  .detail-close { float: right; background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; }
  .detail-section { margin-bottom: 1.25rem; }
  .detail-section h3 { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .75rem; padding-bottom: .5rem; border-bottom: 0.5px solid var(--border); }
  .detail-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 0.5px solid var(--border); }
  .detail-row span:first-child { color: var(--text3); }
  .detail-row span:last-child { color: var(--text); font-weight: 500; }
  .json-block { background: var(--bg3); border: 0.5px solid var(--border); padding: 1rem; font-size: 11px; color: #7ec8e3; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
  .btn-copy-url { background: none; border: 0.5px solid var(--border2); color: var(--text2); padding: 7px 12px; cursor: pointer; font-size: 12px; font-family: var(--font); width: 100%; margin-top: .5rem; }
  .btn-copy-url:hover { border-color: var(--yellow); color: var(--yellow); }

  /* ── COMPOSANTS STATS ── */
  .comp-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
  .comp-stat-card { background: var(--bg3); border: 0.5px solid var(--border); padding: 1rem; }
  .comp-stat-card h3 { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .75rem; }
  .comp-bar { display: flex; align-items: center; gap: .5rem; margin-bottom: 6px; font-size: 12px; }
  .comp-bar-name { color: var(--text2); min-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .comp-bar-track { flex: 1; background: var(--bg4); height: 6px; }
  .comp-bar-fill { height: 6px; background: var(--yellow); }
  .comp-bar-count { color: var(--text3); min-width: 30px; text-align: right; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <h1><i class="ti ti-shield-lock"></i> Obvious Cycles — Admin</h1>
  <div id="login-form">
    <input type="password" id="pwd-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()">
    <button id="login-btn" onclick="doLogin()"><i class="ti ti-login"></i> Accéder</button>
    <div id="login-error">Mot de passe incorrect.</div>
  </div>
</div>

<!-- ── ADMIN UI ── -->
<div id="admin-ui">
  <header>
    <h1><i class="ti ti-settings"></i> Admin Configurateur</h1>
    <div style="display:flex;align-items:center;gap:1rem;">
      <span class="meta" id="last-refresh"></span>
      <button class="logout-btn" onclick="doLogout()"><i class="ti ti-logout"></i> Déconnexion</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats" id="stats-cards"></div>

    <!-- Filtres -->
    <div class="filters">
      <label>Statut
        <select id="f-statut" onchange="applyFilters()">
          <option value="">Tous</option>
          <option value="devis">Devis demandé</option>
          <option value="sauvegarde">Sauvegardé</option>
        </select>
      </label>
      <label>Modèle
        <select id="f-modele" onchange="applyFilters()">
          <option value="">Tous</option>
        </select>
      </label>
      <label>Date début
        <input type="date" id="f-date-start" onchange="applyFilters()">
      </label>
      <label>Date fin
        <input type="date" id="f-date-end" onchange="applyFilters()">
      </label>
      <label>Recherche (nom/email/ID)
        <input type="text" id="f-search" placeholder="Rechercher..." oninput="applyFilters()">
      </label>
      <button class="btn-reset-filter" onclick="resetFilters()"><i class="ti ti-x"></i> Réinitialiser</button>
      <button class="btn-export" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table id="configs-table">
        <thead>
          <tr>
            <th onclick="sortBy('created_at')" data-col="created_at">Date <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('config_id')" data-col="config_id">ID <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('nom_client')" data-col="nom_client">Client <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('modele')" data-col="modele">Modèle <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('prix')" data-col="prix">Prix <span class="sort-icon">↕</span></th>
            <th>Taille</th>
            <th onclick="sortBy('statut')" data-col="statut">Statut <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="configs-tbody"></tbody>
      </table>
      <div id="no-results" class="no-results" style="display:none;">Aucune configuration trouvée.</div>
    </div>

    <!-- Stats composants -->
    <div class="comp-stats" id="comp-stats"></div>
  </main>
</div>

<!-- ── DETAIL PANEL ── -->
<div id="detail-overlay" onclick="closeDetail()"></div>
<div id="detail-panel">
  <button class="detail-close" onclick="closeDetail()">×</button>
  <div id="detail-content"></div>
</div>

<script>
const SUPABASE_URL = 'https://tpxfpmubhkvzratnftnn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRweGZwbXViaGt2enJhdG5mdG5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMzEwMjQsImV4cCI6MjA5NzkwNzAyNH0.-4podykoAjWV3lJDTQelMoYCAqBikGY0yqu9aVXU0qs';
const ADMIN_PWD_HASH = '2b3bcd19407e5da3bd02177d31dcf68c3a0e7ef6ac6e63a2273d3d1c48c5c06f';

let allConfigs = [];
let filtered = [];
let sortCol = 'created_at';
let sortDir = -1;

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function hashPwd(pwd) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  const hash = await hashPwd(pwd);
  if (hash === ADMIN_PWD_HASH) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-ui').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData() {
  const res = await fetch(SUPABASE_URL + '/rest/v1/configurations?select=*&order=created_at.desc&limit=1000', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  allConfigs = await res.json();
  document.getElementById('last-refresh').textContent = 'Dernière mise à jour : ' + new Date().toLocaleTimeString('fr-FR');
  populateModelFilter();
  applyFilters();
  renderCompStats();
}

function populateModelFilter() {
  const sel = document.getElementById('f-modele');
  const models = [...new Set(allConfigs.map(c => c.modele).filter(Boolean))];
  models.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    sel.appendChild(opt);
  });
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const fStatut = document.getElementById('f-statut').value;
  const fModele = document.getElementById('f-modele').value;
  const fStart  = document.getElementById('f-date-start').value;
  const fEnd    = document.getElementById('f-date-end').value;
  const fSearch = document.getElementById('f-search').value.toLowerCase();

  filtered = allConfigs.filter(c => {
    if (fStatut && c.statut !== fStatut) return false;
    if (fModele && c.modele !== fModele) return false;
    if (fStart && c.created_at < fStart) return false;
    if (fEnd   && c.created_at > fEnd + 'T23:59:59') return false;
    if (fSearch && !JSON.stringify(c).toLowerCase().includes(fSearch)) return false;
    return true;
  });

  sortData();
  renderTable();
  renderStats();
}

function resetFilters() {
  ['f-statut','f-modele'].forEach(id => document.getElementById(id).value = '');
  ['f-date-start','f-date-end','f-search'].forEach(id => document.getElementById(id).value = '');
  applyFilters();
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  document.querySelector(`th[data-col="${col}"]`)?.classList.add('sorted');
  sortData();
  renderTable();
}

function sortData() {
  filtered.sort((a, b) => {
    let va = a[sortCol] || '', vb = b[sortCol] || '';
    if (sortCol === 'prix') { va = Number(va); vb = Number(vb); }
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });
}

// ── RENDER TABLE ──────────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('configs-tbody');
  const noRes = document.getElementById('no-results');
  if (!filtered.length) { tbody.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';

  tbody.innerHTML = filtered.map(c => {
    const date = new Date(c.created_at).toLocaleDateString('fr-FR');
    const taille = c.config_json?.dimensions?.taille || '—';
    const badge = c.statut === 'devis'
      ? '<span class="badge badge-devis">Devis</span>'
      : '<span class="badge badge-sauvegarde">Sauvegardé</span>';
    return `<tr class="clickable" onclick="openDetail('${c.config_id}')">
      <td>${date}</td>
      <td style="font-family:monospace;font-size:12px;color:var(--yellow)">${c.config_id}</td>
      <td>${c.nom_client || '—'}</td>
      <td>${c.modele || '—'}</td>
      <td style="font-weight:600">${(c.prix||0).toLocaleString('fr-FR')} €</td>
      <td>${taille}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const total = filtered.length;
  const devis = filtered.filter(c => c.statut === 'devis').length;
  const saved = filtered.filter(c => c.statut === 'sauvegarde').length;
  const avgPrix = total ? Math.round(filtered.reduce((s,c) => s + (c.prix||0), 0) / total) : 0;

  document.getElementById('stats-cards').innerHTML = `
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">Configs total</div></div>
    <div class="stat-card"><div class="stat-val">${devis}</div><div class="stat-lbl">Devis demandés</div></div>
    <div class="stat-card"><div class="stat-val">${saved}</div><div class="stat-lbl">Sauvegardées</div></div>
    <div class="stat-card"><div class="stat-val">${avgPrix.toLocaleString('fr-FR')} €</div><div class="stat-lbl">Prix moyen</div></div>
  `;
}

// ── COMPOSANTS STATS ──────────────────────────────────────────────────────────
function renderCompStats() {
  const postes = ['fourche','roues','pneus','transmission','pilotage','selle'];
  const counts = {};
  postes.forEach(p => { counts[p] = {}; });
  allConfigs.forEach(c => {
    const comp = c.config_json?.composants || {};
    postes.forEach(p => {
      if (comp[p]) counts[p][comp[p]] = (counts[p][comp[p]] || 0) + 1;
    });
  });

  const labels = { fourche:'Fourche', roues:'Roues', pneus:'Pneus', transmission:'Transmission', pilotage:'Pilotage', selle:'Selle' };
  document.getElementById('comp-stats').innerHTML = postes.map(p => {
    const sorted = Object.entries(counts[p]).sort((a,b) => b[1]-a[1]).slice(0,5);
    const max = sorted[0]?.[1] || 1;
    return `<div class="comp-stat-card">
      <h3>${labels[p]}</h3>
      ${sorted.map(([id, n]) => `
        <div class="comp-bar">
          <div class="comp-bar-name" title="${id}">${id.replace(/_/g,' ')}</div>
          <div class="comp-bar-track"><div class="comp-bar-fill" style="width:${Math.round(n/max*100)}%"></div></div>
          <div class="comp-bar-count">${n}</div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function openDetail(configId) {
  const c = allConfigs.find(x => x.config_id === configId);
  if (!c) return;
  const comp = c.config_json?.composants || {};
  const dims = c.config_json?.dimensions || {};
  const shareUrl = `https://obviouscycles.github.io/configurateur/configurateur/proto14.html?config=${c.config_id}`;

  document.getElementById('detail-content').innerHTML = `
    <h2 style="font-size:16px;font-weight:600;margin-bottom:1.5rem;color:var(--yellow)">${c.config_id}</h2>

    <div class="detail-section">
      <h3>Client</h3>
      <div class="detail-row"><span>Nom</span><span>${c.nom_client||'—'}</span></div>
      <div class="detail-row"><span>Email</span><span>${c.email_client||'—'}</span></div>
      <div class="detail-row"><span>Date</span><span>${new Date(c.created_at).toLocaleString('fr-FR')}</span></div>
      <div class="detail-row"><span>Statut</span><span>${c.statut === 'devis' ? '✅ Devis demandé' : '📌 Sauvegardé'}</span></div>
    </div>

    <div class="detail-section">
      <h3>Configuration</h3>
      <div class="detail-row"><span>Modèle</span><span>${c.config_json?.modele_nom||c.modele}</span></div>
      <div class="detail-row"><span>Preset</span><span>${c.preset||'—'}</span></div>
      <div class="detail-row"><span>Prix</span><span style="color:var(--yellow);font-weight:700">${(c.prix||0).toLocaleString('fr-FR')} €</span></div>
    </div>

    ${Object.keys(comp).length ? `<div class="detail-section">
      <h3>Composants</h3>
      ${Object.entries(comp).map(([k,v]) => `<div class="detail-row"><span>${k}</span><span>${v}</span></div>`).join('')}
    </div>` : ''}

    ${Object.keys(dims).filter(k=>dims[k]).length ? `<div class="detail-section">
      <h3>Dimensions</h3>
      ${Object.entries(dims).filter(([k,v])=>v).map(([k,v]) => `<div class="detail-row"><span>${k}</span><span>${v}</span></div>`).join('')}
    </div>` : ''}

    <div class="detail-section">
      <h3>URL partageable</h3>
      <div style="font-size:11px;color:var(--text3);word-break:break-all;margin-bottom:.5rem;">${shareUrl}</div>
      <button class="btn-copy-url" onclick="copyUrl('${shareUrl}')"><i class="ti ti-copy"></i> Copier le lien</button>
      <a href="${shareUrl}" target="_blank" style="display:block;text-align:center;margin-top:.5rem;color:var(--yellow);font-size:12px;">Ouvrir →</a>
    </div>

    <div class="detail-section">
      <h3>JSON brut</h3>
      <div class="json-block">${JSON.stringify(c.config_json, null, 2)}</div>
    </div>
  `;

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-overlay').classList.remove('open');
}

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => alert('Lien copié !'));
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
  const cols = ['config_id','created_at','nom_client','email_client','modele','preset','prix','statut','taille','composants'];
  const rows = [cols.join(';')];
  filtered.forEach(c => {
    const taille = c.config_json?.dimensions?.taille || '';
    const comp = Object.entries(c.config_json?.composants||{}).map(([k,v])=>k+':'+v).join(' | ');
    rows.push([
      c.config_id, c.created_at, c.nom_client||'', c.email_client||'',
      c.modele||'', c.preset||'', c.prix||0, c.statut||'',
      taille, comp
    ].map(v => '"'+String(v).replace(/"/g,'""')+'"').join(';'));
  });
  const blob = new Blob(['\uFEFF'+rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'configs-obvious-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
if (sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-ui').style.display = 'block';
  loadData();
